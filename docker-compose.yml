services:
  # ── Temporal infrastructure ────────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: temporal-postgresql
    environment:
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_DB: temporal
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${TEMPORAL_DB_USER:-temporal}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - temporal-net

  temporal:
    image: temporalio/auto-setup:1.27
    container_name: temporal
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgresql
    ports:
      - '7233:7233'
    # Temporal binds to the container's network interface (not loopback), so probe
    # via its hostname IP. nc (netcat) is available in the auto-setup Alpine image.
    healthcheck:
      test: ['CMD-SHELL', 'nc -z $(hostname -i) 7233 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - temporal-net

  temporal-ui:
    image: temporalio/ui:2.49.1
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - '8080:8080'
    networks:
      - temporal-net

  # ── Application services ───────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: temporal-worker/Dockerfile
    container_name: order-worker
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    restart: on-failure
    networks:
      - temporal-net

  nextjs:
    build:
      context: .
      dockerfile: nextjs-app/Dockerfile
    container_name: order-nextjs
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - '3000:3000'
    networks:
      - temporal-net

volumes:
  postgresql_data:

networks:
  temporal-net:
    driver: bridge
